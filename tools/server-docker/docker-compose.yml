version: "3.8"

networks:
  traefik-public:
    external: true

secrets:
  configuration:
    external: true
    name: "randovania_${SERVER_ENVIRONMENT}_configuration"

volumes:
  server_db:

services:
  randovania:
    image: "randovania/server:${VERSION}"
    volumes:
      - "server_db:/data"

    secrets:
      - configuration

    command: --configuration "/run/secrets/configuration" server run

    hostname: "{{.Node.Hostname}}"

    deploy:
      placement:
        constraints:
          - node.labels.randovania-allow-${SERVER_ENVIRONMENT} == true

      resources:
        reservations:
          memory: 400M

      labels:
        - traefik.enable=true
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}.rule=Host(`${APP_DOMAIN}`)
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}.entrypoints=websecure
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}.tls.certresolver=le
        - traefik.http.services.rdv_${SERVER_ENVIRONMENT}.loadbalancer.server.port=5000
        - traefik.http.middlewares.limit.buffering.maxRequestBodyBytes=25000000

        # backwards-compat redirect for old LEGACY_DOMAIN/PATH_PREFIX -> APP_DOMAIN, remove once clients migrate
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}_redirect.rule=Host(`${LEGACY_DOMAIN}`) && PathPrefix(`/${PATH_PREFIX}`)
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}_redirect.priority=${LEGACY_REDIRECT_PRIORITY}
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}_redirect.entrypoints=websecure
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}_redirect.tls.certresolver=le
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}_redirect.middlewares=rdv_${SERVER_ENVIRONMENT}_redirect
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}_redirect.service=rdv_${SERVER_ENVIRONMENT}
        - traefik.http.middlewares.rdv_${SERVER_ENVIRONMENT}_redirect.redirectregex.regex=^https://${LEGACY_DOMAIN}/${PATH_PREFIX}/(.*)
        - traefik.http.middlewares.rdv_${SERVER_ENVIRONMENT}_redirect.redirectregex.replacement=https://${APP_DOMAIN}/$${1}
        - traefik.http.middlewares.rdv_${SERVER_ENVIRONMENT}_redirect.redirectregex.permanent=true

    networks:
      - traefik-public

  sqlite-web:
    image: "coleifer/sqlite-web"
    volumes:
      - "server_db:/data"

    command:
      - sqlite_web
      - "-H"
      - "0.0.0.0"
      - "-u"
      - "/sqlite-web/${SERVER_ENVIRONMENT}"
      - "-x"
      - data.db

    deploy:
      placement:
        constraints:
          - node.labels.randovania-allow-${SERVER_ENVIRONMENT} == true

      labels:
        - traefik.enable=true
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}_sqlite_web.rule=Host(`${ADMIN_DOMAIN}`) && PathPrefix(`/sqlite-web/${SERVER_ENVIRONMENT}`)
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}_sqlite_web.entrypoints=websecure
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}_sqlite_web.tls.certresolver=le
        - traefik.http.routers.rdv_${SERVER_ENVIRONMENT}_sqlite_web.middlewares=admin-auth
        - traefik.http.services.rdv_${SERVER_ENVIRONMENT}_sqlite_web.loadbalancer.server.port=8080

    networks:
      - traefik-public

  bot:
    image: "randovania/server:${VERSION}"

    secrets:
      - configuration

    environment:
      - OBFUSCATOR_SECRET=${OBFUSCATOR_SECRET:-}

    command: --configuration "/run/secrets/configuration" server bot

    hostname: "{{.Node.Hostname}}"

    deploy:
      placement:
        constraints:
          - node.labels.randovania-allow-${SERVER_ENVIRONMENT} == true

      resources:
        reservations:
          memory: 150M
